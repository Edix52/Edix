<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ChatApp | Gun.js Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --bg: #313338; --sidebar: #2b2d31; --accent: #5865f2; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; }
        .sidebar { width: 240px; background: var(--sidebar); padding: 20px; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #383a40; padding: 10px; border-radius: 8px; width: fit-content; border-left: 4px solid var(--accent); }
        .user { color: var(--accent); font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .input-area { padding: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #383a40; color: white; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Discord-Clone</h3>
        <p style="color: #949ba4;"># genel</p>
    </div>

    <div class="chat">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Mesaj yaz ve Enter'a bas...">
        </div>
    </div>

    <script>
        // Daha fazla ve güncel relay sunucusu ekledik (Biri çalışmazsa diğeri çalışır)
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://gun-ams1.marda.it/gun',
            'https://peer.wall.org/gun'
        ]);

        // Buradaki ismi KENDİNE ÖZEL yap (örn: 'yavuzun-odasi-2026')
        // Eğer başkasıyla aynı yaparsan mesajlar karışır!
        const chat = gun.get('yavuzun-deneme-odasi-7788').get('messages');

        const input = document.getElementById('input');
        const msgDiv = document.getElementById('messages');
        const myUser = "Kullanıcı_" + Math.floor(Math.random() * 1000);

        // Mesaj Gönder
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const messageData = {
                    user: myUser,
                    text: input.value,
                    time: Date.now()
                };
                chat.set(messageData); // Veriyi Gun.js ağına gönderir
                input.value = "";
            }
        };

        // Mesajları Dinle ve Ekrana Bas
        chat.map().on((data, id) => {
            if (data && data.text) {
                // Aynı mesajın tekrar eklenmesini önlemek için basit kontrol
                const existing = document.getElementById(id);
                if (!existing) {
                    const div = document.createElement('div');
                    div.id = id;
                    div.className = 'msg';
                    div.innerHTML = `<div class="user">${data.user}</div><div>${data.text}</div>`;
                    msgDiv.appendChild(div);
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                }
            }
        });
    </script>
</body>
</html>
