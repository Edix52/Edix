<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yavuz Chat | Ultra Fast</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #313338; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #2b2d31; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        #msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #383a40; padding: 10px; border-radius: 5px; }
        .u { color: #5865f2; font-weight: bold; font-size: 12px; }
        .input-box { padding: 20px; }
        input { width: 100%; padding: 15px; background: #383a40; border: none; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar"><h3>Sunucu</h3><p>#genel</p></div>
<div class="main">
    <div id="msg-area"></div>
    <div class="input-box">
        <input type="text" id="inp" placeholder="Mesajı buraya yaz...">
    </div>
</div>

<script>
    // SUPABASE BİLGİLERİNİ BURAYA YAPIŞTIR
    const S_URL = 'SENİN_URLİN'; 
    const S_KEY = 'SENİN_ANON_KEYİN';
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    const area = document.getElementById('msg-area');
    const inp = document.getElementById('inp');
    const user = "User_" + Math.floor(Math.random() * 99);

    // Mesaj Gönder
    inp.onkeydown = async (e) => {
        if(e.key === 'Enter' && inp.value !== "") {
            const txt = inp.value;
            inp.value = "";
            await supabaseClient.from('messages').insert([{ user: user, text: txt }]);
        }
    }

    // Mesajları Ekrana Bas
    function addMsg(m) {
        const d = document.createElement('div');
        d.className = 'msg';
        d.innerHTML = `<div class="u">${m.user}</div><div>${m.text}</div>`;
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
    }

    // Anlık İzle (Bu kısım tıklanma sorunu yapmaz)
    supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        addMsg(payload.new);
    }).subscribe();

    // Sayfa açılınca eski mesajları yükle
    async function load() {
        const { data } = await supabaseClient.from('messages').select('*');
        if(data) data.forEach(addMsg);
    }
    load();
</script>
</body>
</html>
