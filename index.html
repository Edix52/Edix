<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ChatApp | Ücretsiz & Sınırsız</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --bg: #313338; --sidebar: #2b2d31; --accent: #5865f2; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; }
        
        .sidebar { width: 240px; background: var(--sidebar); padding: 20px; display: flex; flex-direction: column; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #383a40; padding: 10px; border-radius: 8px; width: fit-content; }
        .user { color: var(--accent); font-weight: bold; font-size: 12px; }

        .input-area { padding: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #383a40; color: white; outline: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Discord-Clone</h3>
        <p># genel</p>
        <p># oyun</p>
    </div>

    <div class="chat">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Mesaj yaz ve Enter'a bas...">
        </div>
    </div>

    <script>
        // Gun.js'i başlat (Ücretsiz relay sunucuları kullanılır)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const chat = gun.get('yavuzun-gizli-odasi-123').get('messages');

        const input = document.getElementById('input');
        const msgDiv = document.getElementById('messages');
        const myUser = "Kullanıcı_" + Math.floor(Math.random() * 100);

        // Mesaj Gönder
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                chat.set({ user: myUser, text: input.value, time: Date.now() });
                input.value = "";
            }
        };

        // Mesajları Dinle (Anlık gelir)
        chat.map().once((data) => {
            if (data && data.text) {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<div class="user">${data.user}</div><div>${data.text}</div>`;
                msgDiv.appendChild(div);
                msgDiv.scrollTop = msgDiv.scrollHeight;
            }
        });
    </script>
</body>
</html>
