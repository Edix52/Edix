<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatify | Arkadaş Grubu</title>
    <style>
        /* CSS: Discord-Esintili Koyu Tema */
        :root {
            --bg-darker: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-chat: #313338;
            --bg-input: #383a40;
            --accent: #5865f2;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
        }

        body {
            margin: 0;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-chat);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sunucu Sütunu */
        .servers {
            width: 72px;
            background-color: var(--bg-darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background-color: var(--bg-chat);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .server-icon:hover {
            border-radius: 15px;
            background-color: var(--accent);
        }

        /* Kanal Sütunu */
        .channels {
            width: 240px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
        }

        .channels-header {
            padding: 15px;
            font-weight: bold;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
            height: 20px;
        }

        .channel-list {
            padding: 10px;
            flex: 1;
        }

        .channel-item {
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
        }

        .channel-item:hover {
            background-color: rgba(78, 80, 88, 0.3);
            color: var(--text-main);
        }

        .channel-item.active {
            background-color: rgba(78, 80, 88, 0.6);
            color: white;
        }

        /* Mesaj Alanı */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
            font-weight: bold;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-block {
            display: flex;
            flex-direction: column;
        }

        .msg-author {
            color: white;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .msg-text {
            color: var(--text-main);
            font-size: 15px;
            line-height: 1.3;
        }

        /* Giriş Kutusu */
        .input-area {
            padding: 0 20px 24px 20px;
        }

        .input-wrapper {
            background-color: var(--bg-input);
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <nav class="servers">
        <div class="server-icon" style="background-color: var(--accent);">🏠</div>
        <div class="server-icon">G</div>
        <div class="server-icon">O</div>
    </nav>

    <aside class="channels">
        <div class="channels-header">Yavuz'un Sunucusu</div>
        <div class="channel-list">
            <div class="channel-item active"># genel</div>
            <div class="channel-item"># oyun-grubu</div>
            <div class="channel-item"># dersler</div>
        </div>
    </aside>

    <main class="chat-container">
        <div class="chat-header"># genel</div>
        <div id="messages">
            <div class="message-block">
                <div class="msg-author">Sistem</div>
                <div class="msg-text">Hoş geldin! Firebase ayarlarını yapana kadar mesajlar sadece senin ekranında kalır.</div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="#genel kanalına mesaj gönder">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- BURAYA KENDİ FİREBASE BİLGİLERİNİ YAPIŞTIR ---
        const firebaseConfig = {
            apiKey: "SENIN_KEYIN",
            authDomain: "PROJE.firebaseapp.com",
            databaseURL: "https://PROJE.firebaseio.com",
            projectId: "PROJE-ID",
            storageBucket: "PROJE.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        // Firebase Başlatma (Hataları önlemek için kontrol ekliyoruz)
        let msgRef;
        try {
            const app = initializeApp(firebaseConfig);
            const database = getDatabase(app);
            msgRef = ref(database, 'messages');
        } catch (e) {
            console.log("Firebase henüz bağlı değil. Sadece yerel çalışıyor.");
        }

        const input = document.getElementById('chatInput');
        const msgContainer = document.getElementById('messages');
        const username = "Kullanıcı_" + Math.floor(Math.random() * 999);

        // Mesaj Gönderme
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value;
                
                if (msgRef) {
                    // Firebase varsa oraya gönder
                    push(msgRef, { user: username, text: text });
                } else {
                    // Firebase yoksa sadece yerel ekrana bas (Test için)
                    renderMessage(username, text);
                }
                input.value = "";
            }
        });

        // Ekrana Mesaj Basma Fonksiyonu
        function renderMessage(user, text) {
            const div = document.createElement('div');
            div.className = 'message-block';
            div.innerHTML = `
                <div class="msg-author">${user}</div>
                <div class="msg-text">${text}</div>
            `;
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // Firebase'den Mesajları Dinle
        if (msgRef) {
            onChildAdded(msgRef, (snapshot) => {
                const data = snapshot.val();
                renderMessage(data.user, data.text);
            });
        }
    </script>
</body>
</html>
